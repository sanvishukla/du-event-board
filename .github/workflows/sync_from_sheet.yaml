name: Sync Events from Google Sheet

on:
  repository_dispatch:
    types: [sync_from_sheet]
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *" # Run every hour

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Run sync script
        env:
          GOOGLE_SHEET_WEBAPP_URL: ${{ secrets.GOOGLE_SHEET_WEBAPP_URL }}
          GOOGLE_SHEET_SECRET_TOKEN: ${{ secrets.GOOGLE_SHEET_SECRET_TOKEN }}
        run: python scripts/sync_from_sheet.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: sync event updates from Google Sheet"
          title: "feat: sync event updates from Google Sheet"
          body: |
            This PR was automatically raised to sync additions and edits made in the Google Sheet back to the repository's events database.

            *This pull request was automatically generated by GitHub Actions.*
          branch: "sync-from-sheet"
          delete-branch: true
          base: main
