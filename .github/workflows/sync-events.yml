name: Sync Events from Google Sheets

on:
  repository_dispatch:
    types: [new_event_added]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  sync_events:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Dependencies
        run: |
          pip install pyyaml ruamel.yaml requests

      - name: Run Sync Script
        env:
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL || 'https://docs.google.com/spreadsheets/d/10F6Z8uN7SDElBz4Z94qUhXR2i746Pijkj7iR0LPTdnk/export?format=csv&gid=93842923,https://docs.google.com/spreadsheets/d/10F6Z8uN7SDElBz4Z94qUhXR2i746Pijkj7iR0LPTdnk/export?format=csv&gid=204717323' }}
          GOOGLE_SHEET_WEBHOOK_URL: ${{ secrets.GOOGLE_SHEET_WEBHOOK_URL }}
        run: |
          python scripts/sync_google_sheet.py

      - name: Check for changes
        id: check_changes
        run: |
          git diff --exit-code data/events.yaml || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(data): auto-sync events from Google Sheets"
          title: "Update Events from Google Sheets"
          body: |
            This PR was automatically generated by the Google Sheets sync script.
            It contains new events added to the spreadsheet.

            Please review the events before merging!
          branch: auto-sync-events
          base: main
