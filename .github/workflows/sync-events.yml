name: Sync Events from Google Sheets

on:
  repository_dispatch:
    types: [new_event_added]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  sync_events:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Dependencies
        run: |
          pip install pyyaml ruamel.yaml requests

      - name: Run Sync Script
        id: sync
        env:
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL || 'https://docs.google.com/spreadsheets/d/10F6Z8uN7SDElBz4Z94qUhXR2i746Pijkj7iR0LPTdnk/export?format=csv&gid=93842923,https://docs.google.com/spreadsheets/d/10F6Z8uN7SDElBz4Z94qUhXR2i746Pijkj7iR0LPTdnk/export?format=csv&gid=204717323' }}
          SYNC_EVENT_ID: ${{ github.event.client_payload.id }}
        run: |
          if [ -n "$SYNC_EVENT_ID" ]; then
            python scripts/sync_google_sheet.py --id "$SYNC_EVENT_ID"
          else
            python scripts/sync_google_sheet.py
          fi

      - name: Create Pull Request
        if: steps.sync.outputs.BRANCH_NAME != ''
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.sync.outputs.BRANCH_NAME }}
          title: "Sync: ${{ steps.sync.outputs.ACTION }} event ${{ steps.sync.outputs.EVENT_ID }}"
          body: "Automated sync of event ${{ steps.sync.outputs.EVENT_ID }} from Google Sheets."
          commit-message: "sync: ${{ steps.sync.outputs.ACTION }} event ${{ steps.sync.outputs.EVENT_ID }}"
          base: main
          delete-branch: true
