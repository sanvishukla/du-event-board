name: Handle Event Submission

on:
  repository_dispatch:
    types: [new_event_submission]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Add event to events.yaml and regenerate JSON
        env:
          EVENT_PAYLOAD: ${{ toJson(github.event.client_payload.event_data || github.event.client_payload) }}
        run: python scripts/add_event_from_submission.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Format files
        run: npx prettier --write .

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: add event '${{ github.event.client_payload.event_data['Event Name'] || github.event.client_payload['Event Name'] || github.event.client_payload.event_name }}'"
          title: "feat: add event '${{ github.event.client_payload.event_data['Event Name'] || github.event.client_payload['Event Name'] || github.event.client_payload.event_name }}'"
          body: |
            A new event has been submitted via the Google Form.

            ### Event Details
            - **Event Name**: `${{ github.event.client_payload.event_data['Event Name'] || github.event.client_payload['Event Name'] || github.event.client_payload.event_name }}`
            - **Start Date**: `${{ github.event.client_payload.event_data['Start Date and Time'] || github.event.client_payload['Start Date and Time'] || github.event.client_payload.start_date }}`
            - **End Date**: `${{ github.event.client_payload.event_data['End Date and Time'] || github.event.client_payload['End Date and Time'] || github.event.client_payload.end_date }}`
            - **Event Type / Category**: `${{ github.event.client_payload.event_data['Event Type (e.g., Conference, Workshop, Webinar)'] || github.event.client_payload['Event Type (e.g., Conference, Workshop, Webinar)'] || github.event.client_payload.event_type }}`
            - **Location**: `${{ github.event.client_payload.event_data['Physical Location (If In-Person: Full Address)'] || github.event.client_payload['Physical Location (If In-Person: Full Address)'] || github.event.client_payload.location }}`
            - **Region**: `${{ github.event.client_payload.event_data['Geographic Region (e.g., North America, Europe, APAC, Global)'] || github.event.client_payload['Geographic Region (e.g., North America, Europe, APAC, Global)'] || github.event.client_payload.region }}`
            - **Location Type**: `${{ github.event.client_payload.event_data['Location Type'] || github.event.client_payload['Location Type'] || github.event.client_payload.in_person }}`
            - **Language**: `${{ github.event.client_payload.event_data['Primary Language of the Event'] || github.event.client_payload['Primary Language of the Event'] || github.event.client_payload.language }}`

            *This pull request was automatically generated by GitHub Actions in response to a Google Form submission.*
          branch: "event-submission-${{ github.run_id }}"
          delete-branch: true
          base: main
